name: Eternal Update & Deploy Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    name: Build & Sign Production APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm install
      - name: Build Web App
        run: npm run build
      - name: Initialize Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Generate Mobile Assets
        run: npm run mobile:assets
      # ══════════════════════════════════════════════════════════════
      # SIGNING KEY — DETERMINISTIC & PROTECTED
      # KEYSTORE_BASE64 secret MUST exist — build fails if missing
      # This ensures the SAME keystore is used across ALL builds
      # ══════════════════════════════════════════════════════════════
      - name: Restore Signing Key
        id: signing_key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p android/app/
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  ❌ FATAL: KEYSTORE_BASE64 secret is NOT SET!           ║"
            echo "║                                                          ║"
            echo "║  Building without the original keystore will produce     ║"
            echo "║  an APK with a DIFFERENT signature → users get           ║"
            echo "║  'App Not Installed' error when updating.                ║"
            echo "║                                                          ║"
            echo "║  FIX: Go to GitHub → Settings → Secrets → Actions        ║"
            echo "║  and set KEYSTORE_BASE64 from the original keystore:     ║"
            echo "║    base64 -w 0 release-key.jks | copy to secret          ║"
            echo "║  Also set: KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD    ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            echo ""
            exit 1
          fi
          echo "✅ Using permanent keystore from GitHub Secrets"
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks
          KP=${KEYSTORE_PASSWORD:-"mihrab2026"}
          # Print signing fingerprint for verification
          echo ""
          echo "🔑 Signing key fingerprint (SHA-256):"
          keytool -list -v -keystore android/app/release-key.jks -storepass "$KP" 2>/dev/null | grep -A1 "SHA256:" || true
      # ══════════════════════════════════════════════════════════════
      # GRADLE CONFIG — SAFE, IDEMPOTENT SIGNING INJECTION
      # Uses precise regex to avoid duplicate or misplaced entries
      # ══════════════════════════════════════════════════════════════
      - name: Configure Gradle Signing & Versioning
        shell: python
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          import os, re
          gradle_path = 'android/app/build.gradle'
          with open(gradle_path, 'r') as f:
              content = f.read()
          kp = os.environ.get('KEYSTORE_PASSWORD') or 'mihrab2026'
          ka = os.environ.get('KEY_ALIAS') or 'mihrab-alias'
          ky = os.environ.get('KEY_PASSWORD') or 'mihrab2026'
          # ── Step 1: Inject signingConfigs block (only if not present) ──
          if 'mihrabSigning' not in content:
              signing_block = (
                  "\n    signingConfigs {\n"
                  "        mihrabSigning {\n"
                  f"            storeFile file('release-key.jks')\n"
                  f"            storePassword '{kp}'\n"
                  f"            keyAlias '{ka}'\n"
                  f"            keyPassword '{ky}'\n"
                  "        }\n"
                  "    }\n"
              )
              content = content.replace('android {', 'android {' + signing_block, 1)
          # ── Step 2: Inject signingConfig into buildTypes (idempotent) ──
          # Only inject if not already present in each block
          def inject_signing_into_buildtype(content, build_type):
              # Match the specific buildType block
              pattern = rf'({build_type}\s*\{{)'
              # Check if signingConfig is already in this buildType's block
              bt_match = re.search(rf'{build_type}\s*\{{[^}}]*signingConfig', content)
              if bt_match:
                  return content  # Already has signingConfig — skip
              return re.sub(pattern, rf'\1\n            signingConfig signingConfigs.mihrabSigning', content, count=1)
          content = inject_signing_into_buildtype(content, 'release')
          content = inject_signing_into_buildtype(content, 'debug')
          # ── Step 3: Update versionCode ──
          run_num = os.environ.get('RUN_NUMBER', '1')
          content = re.sub(r'versionCode\s+\d+', f'versionCode {run_num}', content)
          with open(gradle_path, 'w') as f:
              f.write(content)
          print(f"✅ Gradle configured: versionCode={run_num}, signing=mihrabSigning")
          # ── Debug: show the relevant section ──
          with open(gradle_path, 'r') as f:
              lines = f.readlines()
          for i, line in enumerate(lines):
              if 'signingConfig' in line.lower() or 'mihrabSigning' in line:
                  print(f"  Line {i+1}: {line.rstrip()}")
      # ══════════════════════════════════════════════════════════════
      # BUILD — Using ONLY build.gradle signing (no command-line override)
      # This prevents conflicts between two signing methods
      # ══════════════════════════════════════════════════════════════
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      # ══════════════════════════════════════════════════════════════
      # VERIFY — Confirm APK is correctly signed
      # ══════════════════════════════════════════════════════════════
      - name: Verify APK Signature
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK file not found!"
            ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory does not exist"
            exit 1
          fi
          echo "✅ APK found: $(du -h $APK_PATH | cut -f1)"
          # Verify signature
          if $APKSIGNER verify --print-certs "$APK_PATH"; then
            echo "✅ APK is SIGNED correctly"
            echo ""
            echo "🔑 APK certificate fingerprint:"
            $APKSIGNER verify --print-certs "$APK_PATH" 2>&1 | grep -i "sha-256" || true
          else
            echo "❌ APK signature verification FAILED"
            exit 1
          fi
      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-production-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
      - name: Export Keystore for Backup
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-keystore-backup
          path: android/app/release-key.jks
          retention-days: 1
