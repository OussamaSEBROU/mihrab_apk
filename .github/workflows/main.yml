name: Eternal Update & Deploy Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch: # يسمح لك بتشغيل العملية يدوياً

jobs:
  build:
    name: Build & Sign Production APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Mobile Assets
        run: npm run mobile:assets

      - name: Handle Signing Key (Self-Healing)
        id: signing_key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: "mihrab2026"
          KEY_ALIAS: "mihrab-alias"
          KEY_PASSWORD: "mihrab2026"
        run: |
          mkdir -p android/app/
          
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "--- [WARNING] NO KEYSTORE FOUND IN SECRETS ---"
            echo "Generating a permanent key for you now..."
            keytool -genkey -v -keystore android/app/release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" -dname "CN=Mihrab, OU=Dev, O=Mihrab, L=City, S=Default, C=US"
            
            echo "--- [ACTION REQUIRED] COPY THE CODE BELOW ---"
            echo "Go to GitHub Secrets and add KEYSTORE_BASE64 with this value:"
            base64 -w 0 android/app/release-key.jks
            echo ""
            echo "--- END OF CODE ---"
          else
            echo "Using existing keystore from Secrets..."
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks
          fi

      - name: Configure Gradle Signing & Versioning
        env:
          KEYSTORE_PASSWORD: "mihrab2026"
          KEY_ALIAS: "mihrab-alias"
          KEY_PASSWORD: "mihrab2026"
        run: |
          GRADLE_FILE="android/app/build.gradle"
          python3 -c "
          import sys, os, re
          gradle_path = '$GRADLE_FILE'
          with open(gradle_path, 'r') as f:
              content = f.read()
          
          signing_config = '''
              signingConfigs {
                  release {
                      storeFile file('release-key.jks')
                      storePassword \"''' + os.environ['KEYSTORE_PASSWORD'] + '''\"
                      keyAlias \"''' + os.environ['KEY_ALIAS'] + '''\"
                      keyPassword \"''' + os.environ['KEY_PASSWORD'] + '''\"
                  }
              }
          '''
          
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {\n' + signing_config)
          
          release_config = 'signingConfig signingConfigs.release'
          content = re.sub(r'release \{', f'release {{\n            {release_config}', content)
          content = re.sub(r'debug \{', f'debug {{\n            {release_config}', content)
          
          run_number = os.getenv('GITHUB_RUN_NUMBER', '1')
          content = re.sub(r'versionCode \d+', f'versionCode {run_number}', content)
          
          with open(gradle_path, 'w') as f:
              f.write(content)
          "

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-production-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
