name: Build Android APK (Hybrid Stable)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Mobile Assets
        run: npm run mobile:assets || echo "No assets script found, skipping"

      # ── الإصلاح النهائي: دمج كودك الأصلي مع أسرارك الحقيقية ──
      - name: Configure Stable Signing and Versioning
        env:
          K_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          K_PASS: ${{ secrets.KEY_PASSWORD }}
          K_ALIAS: ${{ secrets.KEY_ALIAS }}
          ST_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          GRADLE_FILE="android/app/build.gradle"
          
          # 1. فك تشفير مفتاحك الحقيقي ووضعه في مكانه
          echo "$K_BASE64" | base64 -d > android/app/my-release-key.jks
          
          # 2. حقن إعدادات التوقيع (نفس منطق كودك الأصلي تماماً)
          python3 -c "
          import sys, os, re
          
          # جلب القيم الحقيقية من الـ Secrets
          k_pass = os.environ.get('K_PASS')
          st_pass = os.environ.get('ST_PASS')
          k_alias = os.environ.get('K_ALIAS')
          
          content = open('$GRADLE_FILE').read()
          
          signing_config = f'''
              signingConfigs {{
                  release {{
                      storeFile file('my-release-key.jks')
                      storePassword \"{st_pass}\"
                      keyAlias \"{k_alias}\"
                      keyPassword \"{k_pass}\"
                  }}
              }}
          '''
          
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_config)
          
          # ربط التوقيع بالـ Debug والـ Release لضمان قبول التحديث دائماً (كودك الأصلي)
          content = content.replace('buildTypes {', 'buildTypes {\\n        release {\\n            signingConfig signingConfigs.release\\n        }\\n        debug {\\n            signingConfig signingConfigs.release\\n        }')
          
          # رفع رقم الإصدار (versionCode) تلقائياً
          run_number = os.environ.get('GITHUB_RUN_NUMBER', '1')
          content = re.sub(r'versionCode \d+', f'versionCode {run_number}', content)
          
          with open('$GRADLE_FILE', 'w') as f:
              f.write(content)
          "

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-stable-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
