name: Build Signed APK (Smart Sign)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Manage Signing Key
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "✅ Using provided Keystore Secret."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
            echo "STORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          else
            echo "⚠️ No Secret found. Generating a fresh Emergency Keystore for this user."
            keytool -genkeypair -v -keystore android/app/release.jks -alias sanctuary -keyalg RSA -keysize 2048 -validity 10000 -storepass sanctuary123 -keypass sanctuary123 -dname "CN=Mihrab, OU=Dev, O=Mihrab, L=City, S=State, C=US"
            echo "STORE_PASS=sanctuary123" >> $GITHUB_ENV
            echo "KEY_PASS=sanctuary123" >> $GITHUB_ENV
            echo "KEY_ALIAS=sanctuary" >> $GITHUB_ENV
          fi

      - name: Configure Gradle
        run: |
          GRADLE_FILE="android/app/build.gradle"
          python3 -c "
          import os, re
          content = open('$GRADLE_FILE').read()
          
          # Inject Signing Config
          signing = '''
              signingConfigs {
                  release {
                      storeFile file('release.jks')
                      storePassword os.environ.get('STORE_PASS', 'sanctuary123')
                      keyAlias os.environ.get('KEY_ALIAS', 'sanctuary')
                      keyPassword os.environ.get('KEY_PASS', 'sanctuary123')
                  }
              }
          '''
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing)
          
          # Apply to Release Build
          if 'signingConfig signingConfigs.release' not in content:
              content = content.replace('buildTypes {', 'buildTypes {\n        release {\n            signingConfig signingConfigs.release\n            minifyEnabled false\n        }')
          
          # Auto Versioning
          run_num = os.environ.get('GITHUB_RUN_NUMBER', '1')
          content = re.sub(r'versionCode \d+', f'versionCode {run_num}', content)
          
          with open('$GRADLE_FILE', 'w') as f:
              f.write(content)
          " env
        env:
          STORE_PASS: ${{ env.STORE_PASS }}
          KEY_PASS: ${{ env.KEY_PASS }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}

      - name: Assemble Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mihrab-Signed-APK-v${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
