name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Mobile Assets
        run: npm run mobile:assets

      # ── الإصلاح التقني: توقيع ثابت ورقم إصدار تصاعدي ──
      - name: Configure Stable Signing and Versioning
        run: |
          GRADLE_FILE="android/app/build.gradle"
          
          # إنشاء مفتاح توقيع (Keystore) ثابت لضمان تطابق التوقيع في كل تحديث
          keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias my-alias -storepass password -keypass password -dname "CN=Sanctuary, OU=Dev, O=Sanctuary, L=City, S=State, C=US"
          mv my-release-key.jks android/app/
          
          # حقن إعدادات التوقيع وزيادة رقم الإصدار برمجياً عبر بايثون لضمان الدقة
          python3 -c "
          import sys, os, re
          content = open('$GRADLE_FILE').read()
          
          signing_config = '''
              signingConfigs {
                  release {
                      storeFile file('my-release-key.jks')
                      storePassword 'password'
                      keyAlias 'my-alias'
                      keyPassword 'password'
                  }
              }
          '''
          
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_config)
          
          # ربط التوقيع بالـ Debug والـ Release لضمان قبول التحديث دائماً
          content = content.replace('buildTypes {', 'buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }\n        debug {\n            signingConfig signingConfigs.release\n        }')
          
          # رفع رقم الإصدار (versionCode) تلقائياً بناءً على رقم العملية في GitHub
          run_number = os.getenv('GITHUB_RUN_NUMBER', '1')
          content = re.sub(r'versionCode \d+', f'versionCode {run_number}', content)
          
          with open('$GRADLE_FILE', 'w') as f:
              f.write(content)
          "

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
