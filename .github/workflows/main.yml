name: Eternal Update & Deploy Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Production APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Mobile Assets
        run: npm run mobile:assets

      - name: Handle Signing Key (Self-Healing)
        id: signing_key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: "mihrab2026"
          KEY_ALIAS: "mihrab-alias"
          KEY_PASSWORD: "mihrab2026"
        run: |
          mkdir -p android/app/
          
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "--- [WARNING] NO KEYSTORE FOUND IN SECRETS ---"
            echo "Generating a permanent key for you now..."
            keytool -genkey -v -keystore android/app/release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" -dname "CN=Mihrab, OU=Dev, O=Mihrab, L=City, S=Default, C=US"
            
            echo "--- [ACTION REQUIRED] COPY THE CODE BELOW ---"
            echo "Go to GitHub Secrets and add KEYSTORE_BASE64 with this value:"
            base64 -w 0 android/app/release-key.jks
            echo ""
            echo "--- END OF CODE ---"
          else
            echo "Using existing keystore from Secrets..."
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks
          fi

      - name: Configure Gradle Signing & Versioning
        env:
          KEYSTORE_PASSWORD: "mihrab2026"
          KEY_ALIAS: "mihrab-alias"
          KEY_PASSWORD: "mihrab2026"
        run: |
          # استعمال بايثون لإجراء عملية جراحية دقيقة لملف Gradle
          python3 -c "
          import os, re
          
          path = 'android/app/build.gradle'
          with open(path, 'r') as f:
              content = f.read()
          
          # 1. إعداد كتلة التوقيع بمسمى فريد لتجنب التداخل
          signing_block = '''
    signingConfigs {
        mihrabSigning {
            storeFile file('release-key.jks')
            storePassword \"''' + os.environ['KEYSTORE_PASSWORD'] + '''\"
            keyAlias \"''' + os.environ['KEY_ALIAS'] + '''\"
            keyPassword \"''' + os.environ['KEY_PASSWORD'] + '''\"
        }
    }
          '''
          
          # حقن التوقيع بعد بداية بلوك أندرويد مباشرة
          if 'mihrabSigning' not in content:
              content = content.replace('android {', 'android {' + signing_block)
          
          # 2. ربط التوقيع بالـ Release والـ Debug داخل buildTypes فقط
          # نستخدم التعابير النمطية لضمان الدقة
          build_types_match = re.search(r'buildTypes\s*\{', content)
          if build_types_match:
              start = build_types_match.end()
              # حقن التوقيع داخل الـ release والـ debug
              content = content.replace('release {', 'release {\n            signingConfig signingConfigs.mihrabSigning')
              content = content.replace('debug {', 'debug {\n            signingConfig signingConfigs.mihrabSigning')
          
          # 3. تحديث رقم الإصدار آلياً
          run_number = os.getenv('GITHUB_RUN_NUMBER', '1')
          content = re.sub(r'versionCode\s+\d+', f'versionCode {run_number}', content)
          
          with open(path, 'w') as f:
              f.write(content)
          "

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-production-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
