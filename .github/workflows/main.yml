name: Build Signed APK (Fail-Safe Engineer)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Initialize Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Master Stroke - Generate Perfect Gradle
        run: |
          # 1. Force SDK 34 in variables.gradle
          cat <<EOF > android/variables.gradle
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
          }
          EOF

          # 2. Write a static, perfect build.gradle that ignores local mess
          # We use environment variables for passwords safely
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'

          android {
              compileSdkVersion rootProject.ext.compileSdkVersion
              defaultConfig {
                  applicationId "com.sanctuary.reader.simple"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode \${{ github.run_number }}
                  versionName "1.0.\${{ github.run_number }}"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }
              
              signingConfigs {
                  release {
                      storeFile file('release.jks')
                      storePassword System.getenv("ST_PASS") ?: 'sanctuary123'
                      keyAlias System.getenv("K_ALIAS") ?: 'sanctuary'
                      keyPassword System.getenv("K_PASS") ?: 'sanctuary123'
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation "androidx.appcompat:appcompat:\$rootProject.ext.androidxAppCompatVersion"
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
          }

          try {
              def servicesJSON = file('google-services.json')
              if (servicesJSON.text) {
                  apply plugin: 'com.google.gms.google-services'
              }
          } catch(Exception e) {
              logger.info("google-services.json not found, skipping plugin registration")
          }
          EOF

      - name: Prep Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
            echo "ST_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "K_PASS=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "K_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          else
            keytool -genkeypair -v -keystore android/app/release.jks -alias sanctuary -keyalg RSA -keysize 2048 -validity 10000 -storepass sanctuary123 -keypass sanctuary123 -dname "CN=Mihrab, OU=Dev, O=Mihrab, L=City, S=State, C=US"
            echo "ST_PASS=sanctuary123" >> $GITHUB_ENV
            echo "K_PASS=sanctuary123" >> $GITHUB_ENV
            echo "K_ALIAS=sanctuary" >> $GITHUB_ENV
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ST_PASS: ${{ env.ST_PASS }}
          K_PASS: ${{ env.K_PASS }}
          K_ALIAS: ${{ env.K_ALIAS }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mihrab-V${{ github.run_number }}-Perfect
          path: android/app/build/outputs/apk/release/app-release.apk
