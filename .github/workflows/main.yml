name: Build Signed APK (Perfect Sign)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Setup Android Project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Prepare Signing Key
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
            echo "PW=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "AL=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          else
            keytool -genkeypair -v -keystore android/app/release.jks -alias sanctuary -keyalg RSA -keysize 2048 -validity 10000 -storepass sanctuary123 -keypass sanctuary123 -dname "CN=Mihrab, OU=Dev, O=Mihrab, L=City, S=State, C=US"
            echo "PW=sanctuary123" >> $GITHUB_ENV
            echo "AL=sanctuary" >> $GITHUB_ENV
          fi

      - name: Surgical Gradle Injection
        run: |
          APP_GRADLE="android/app/build.gradle"
          python3 -c "
          import os, re
          
          pw = os.environ.get('PW', 'sanctuary123')
          alias = os.environ.get('AL', 'sanctuary').strip()
          
          with open('$APP_GRADLE', 'r') as f:
              content = f.read()

          # 1. Force SDK Versions (Fixes compileSdkVersion error)
          content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', content)
          content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', content)
          
          if 'signingConfigs' not in content:
              # Create the signing config block
              signing_block = f'''
    signingConfigs {{
        release {{
            storeFile file(\"release.jks\")
            storePassword \"{pw}\"
            keyAlias \"{alias}\"
            keyPassword \"{pw}\"
        }}
    }}
'''
              # Inject it right at the start of the android block
              content = content.replace('android {', 'android {' + signing_block)

          # 2. Assign the signing config to the release build
          if 'signingConfig signingConfigs.release' not in content:
              content = content.replace('buildTypes {', 'buildTypes {\n        release {\n            signingConfig signingConfigs.release')

          # 3. Auto-increment version code
          run_num = os.environ.get('GITHUB_RUN_NUMBER', '1')
          content = re.sub(r'versionCode \d+', f'versionCode {run_num}', content)

          with open('$APP_GRADLE', 'w') as f:
              f.write(content)
          "
        env:
          PW: ${{ env.PW }}
          AL: ${{ env.AL }}

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mihrab-V${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
