
name: Eternal Update & Deploy Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Production APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Mobile Assets
        run: npm run mobile:assets

      - name: Handle Signing Key (Self-Healing)
        id: signing_key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          # نستخدم الأسرار المشفرة للأمان المطلق
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p android/app/
          # استخدام قيم افتراضية آمنة في حال لم يتم ضبط الأسرار بعد (للعملية الأولى فقط)
          KP=${KEYSTORE_PASSWORD:-"mihrab2026"}
          KA=${KEY_ALIAS:-"mihrab-alias"}
          KY=${KEY_PASSWORD:-"mihrab2026"}
          
          if [ -z "$KEYSTORE_BASE64" ]; then
            keytool -genkey -v -keystore android/app/release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias "$KA" -storepass "$KP" -keypass "$KY" -dname "CN=Mihrab, OU=Dev, O=Mihrab, L=City, S=Default, C=US"
            echo "--- [ACTION REQUIRED] COPY THIS ---"
            base64 -w 0 android/app/release-key.jks
            echo ""
          else
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks
          fi

      - name: Configure Gradle Signing & Versioning
        shell: python
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          import os, re
          
          gradle_path = 'android/app/build.gradle'
          with open(gradle_path, 'r') as f:
              content = f.read()
          
          # جلب القيم من الأسرار المشفرة مع توفير بديل آمن لتجنب الفشل
          kp = os.environ.get('KEYSTORE_PASSWORD', 'mihrab2026')
          ka = os.environ.get('KEY_ALIAS', 'mihrab-alias')
          ky = os.environ.get('KEY_PASSWORD', 'mihrab2026')
          
          signing_conf = "\n" + "    signingConfigs {" + "\n" + \
                         "        mihrabSigning {" + "\n" + \
                         "            storeFile file('release-key.jks')" + "\n" + \
                         "            storePassword '" + kp + "'" + "\n" + \
                         "            keyAlias '" + ka + "'" + "\n" + \
                         "            keyPassword '" + ky + "'" + "\n" + \
                         "        }" + "\n" + "    }" + "\n"
          
          if 'mihrabSigning' not in content:
              content = content.replace('android {', 'android {' + signing_conf)
          
          content = content.replace('release {', 'release {\n            signingConfig signingConfigs.mihrabSigning')
          content = content.replace('debug {', 'debug {\n            signingConfig signingConfigs.mihrabSigning')
          
          content = re.sub(r'versionCode\s+\d+', "versionCode " + os.environ['RUN_NUMBER'], content)
          
          with open(gradle_path, 'w') as f:
              f.write(content)

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          KP=${KEYSTORE_PASSWORD:-"mihrab2026"}
          KA=${KEY_ALIAS:-"mihrab-alias"}
          KY=${KEY_PASSWORD:-"mihrab2026"}
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release-key.jks \
            -Pandroid.injected.signing.store.password="$KP" \
            -Pandroid.injected.signing.key.alias="$KA" \
            -Pandroid.injected.signing.key.password="$KY"

      - name: Verify APK Signature
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK file found: $(du -h $APK_PATH | cut -f1)"
            $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner verify --print-certs "$APK_PATH" && echo "✅ APK is SIGNED correctly" || echo "❌ APK is NOT signed"
          else
            echo "❌ APK file not found at $APK_PATH"
            ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory does not exist"
            exit 1
          fi

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-production-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Export Keystore for Backup
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-keystore-backup
          path: android/app/release-key.jks
          retention-days: 1
