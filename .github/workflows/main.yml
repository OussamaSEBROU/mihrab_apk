

name: Eternal Update & Deploy Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Production APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Mobile Assets
        run: npm run mobile:assets

      - name: Handle Signing Key (Self-Healing)
        id: signing_key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          # نستخدم الأسرار المشفرة للأمان المطلق
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p android/app/
          # استخدام قيم افتراضية آمنة في حال لم يتم ضبط الأسرار بعد (للعملية الأولى فقط)
          KP=${KEYSTORE_PASSWORD:-"mihrab2026"}
          KA=${KEY_ALIAS:-"mihrab-alias"}
          KY=${KEY_PASSWORD:-"mihrab2026"}
          
          if [ -z "$KEYSTORE_BASE64" ]; then
            keytool -genkey -v -keystore android/app/release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias "$KA" -storepass "$KP" -keypass "$KY" -dname "CN=Mihrab, OU=Dev, O=Mihrab, L=City, S=Default, C=US"
            echo "--- [ACTION REQUIRED] COPY THIS ---"
            base64 -w 0 android/app/release-key.jks
            echo ""
          else
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks
          fi

      - name: Configure Gradle Signing & Versioning
        shell: python
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          import os, re
          
          gradle_path = 'android/app/build.gradle'
          with open(gradle_path, 'r') as f:
              content = f.read()
          
          # ===== التحقق من تطابق applicationId مع capacitor.config.ts =====
          expected_app_id = 'com.sanctuary.reader.simple'
          if expected_app_id not in content:
              print(f'⚠️ WARNING: applicationId "{expected_app_id}" not found in build.gradle!')
              # Force-set the correct applicationId
              content = re.sub(
                  r'applicationId\s+"[^"]+"',
                  f'applicationId "{expected_app_id}"',
                  content
              )
              print(f'✅ applicationId corrected to: {expected_app_id}')
          
          # جلب القيم من الأسرار المشفرة مع توفير بديل آمن لتجنب الفشل
          kp = os.environ.get('KEYSTORE_PASSWORD', 'mihrab2026')
          ka = os.environ.get('KEY_ALIAS', 'mihrab-alias')
          ky = os.environ.get('KEY_PASSWORD', 'mihrab2026')
          
          # ===== إدراج signingConfigs مرة واحدة فقط =====
          if 'mihrabSigning' not in content:
              signing_conf = "\n" + "    signingConfigs {" + "\n" + \
                             "        mihrabSigning {" + "\n" + \
                             "            storeFile file('release-key.jks')" + "\n" + \
                             "            storePassword '" + kp + "'" + "\n" + \
                             "            keyAlias '" + ka + "'" + "\n" + \
                             "            keyPassword '" + ky + "'" + "\n" + \
                             "        }" + "\n" + "    }" + "\n"
              content = content.replace('android {', 'android {' + signing_conf)
              print('✅ signingConfigs block injected')
          else:
              print('ℹ️ signingConfigs already exists — skipping injection')
          
          # ===== ربط التوقيع بأنماط البناء (مع حماية من التكرار) =====
          if 'signingConfig signingConfigs.mihrabSigning' not in content:
              content = content.replace(
                  'release {',
                  'release {\n            signingConfig signingConfigs.mihrabSigning'
              )
              content = content.replace(
                  'debug {',
                  'debug {\n            signingConfig signingConfigs.mihrabSigning'
              )
              print('✅ signingConfig linked to release & debug build types')
          else:
              print('ℹ️ signingConfig already linked — skipping')
          
          # ===== versionCode: قاعدة ثابتة + رقم البناء لضمان الزيادة الدائمة =====
          # القاعدة 1000 تضمن أن أي نسخة جديدة أعلى من النسخ المثبتة يدوياً
          base_version = 1000
          run_number = int(os.environ['RUN_NUMBER'])
          final_version_code = base_version + run_number
          content = re.sub(r'versionCode\s+\d+', f'versionCode {final_version_code}', content)
          print(f'✅ versionCode set to: {final_version_code} (base={base_version} + run={run_number})')
          
          # ===== versionName: تحديث ليعكس رقم البناء =====
          content = re.sub(
              r'versionName\s+"[^"]+"',
              f'versionName "1.0.{run_number}"',
              content
          )
          print(f'✅ versionName set to: 1.0.{run_number}')
          
          with open(gradle_path, 'w') as f:
              f.write(content)
          
          print('🏗️ Gradle configuration complete — ready for signed build')

      - name: Validate Signing Key Integrity
        run: |
          echo "🔍 Validating keystore..."
          keytool -list -keystore android/app/release-key.jks -storepass "${KEYSTORE_PASSWORD:-mihrab2026}" -alias "${KEY_ALIAS:-mihrab-alias}" 2>/dev/null && echo "✅ Keystore valid" || echo "⚠️ Keystore validation warning (may be first run)"

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-production-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Export Keystore for Secure Backup
        uses: actions/upload-artifact@v4
        with:
          name: mihrab-secure-keystore
          path: android/app/release-key.jks
