name: Mihrab Pro Build (Clean Start)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: |
          npx cap add android
          npx cap sync android

      - name: Inject Signing Secrets
        run: |
          # 1. Decode Keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
          
          # 2. Add properties to gradle.properties (The Stable Way)
          PROP_FILE="android/gradle.properties"
          echo "MY_STORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $PROP_FILE
          echo "MY_KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> $PROP_FILE
          echo "MY_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $PROP_FILE

      - name: Stable Build Patch
        run: |
          # Use Python for a single, reliable replacement
          APP_GRADLE="android/app/build.gradle"
          python3 -c "
          import os, re
          content = open('$APP_GRADLE').read()
          
          # Precise block injection
          signing_block = '''
    signingConfigs {
        release {
            storeFile file('release.jks')
            storePassword MY_STORE_PASS
            keyAlias MY_KEY_ALIAS
            keyPassword MY_KEY_PASS
        }
    }
'''
          # Inject and ensure built-in variables are used
          content = content.replace('android {', 'android {' + signing_block)
          content = content.replace('buildTypes {', 'buildTypes {\n        release {\n            signingConfig signingConfigs.release')
          
          # Force SDK 34
          content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', content)
          
          with open('$APP_GRADLE', 'w') as f:
              f.write(content)
          "
          
          # Ensure Variables are correct in root
          VARS_GRADLE="android/variables.gradle"
          sed -i 's/compileSdkVersion = [0-9]\+/compileSdkVersion = 34/g' $VARS_GRADLE
          sed -i 's/targetSdkVersion = [0-9]\+/targetSdkVersion = 34/g' $VARS_GRADLE

      - name: Assemble Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mihrab-V${{ github.run_number }}-Stable
          path: android/app/build/outputs/apk/release/app-release.apk
