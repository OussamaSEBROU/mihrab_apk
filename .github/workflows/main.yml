name: Build Signed APK (Certified Engineering)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Initialize Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Master Stroke - Generate Perfect Gradle
        env:
          MY_RUN_NUMBER: ${{ github.run_number }}
        run: |
          # 1. Force SDK 34 in variables.gradle
          cat <<EOF > android/variables.gradle
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
          }
          EOF

          # 2. Write a static, perfect build.gradle
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'

          android {
              compileSdkVersion rootProject.ext.compileSdkVersion
              defaultConfig {
                  applicationId "com.sanctuary.reader.simple"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode $MY_RUN_NUMBER
                  versionName "1.0.$MY_RUN_NUMBER"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }
              
              signingConfigs {
                  release {
                      storeFile file('release.jks')
                      storePassword System.getenv("ST_PASS")
                      keyAlias System.getenv("K_ALIAS")
                      keyPassword System.getenv("K_PASS")
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation "androidx.appcompat:appcompat:\$rootProject.ext.androidxAppCompatVersion"
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
          }
          EOF

      - name: Prep Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
            echo "ST_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "K_PASS=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "K_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          else
            echo "⚠️ ERROR: Secrets missing but required for this build stage!"
            exit 1
          fi

      - name: Build APK (Final Action)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ST_PASS: ${{ env.ST_PASS }}
          K_PASS: ${{ env.K_PASS }}
          K_ALIAS: ${{ env.K_ALIAS }}

      - name: Upload Perfect APK
        uses: actions/upload-artifact@v4
        with:
          name: Mihrab-V${{ github.run_number }}-Production
          path: android/app/build/outputs/apk/release/app-release.apk
