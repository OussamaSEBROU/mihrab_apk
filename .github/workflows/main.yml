name: Build Signed APK (Ultra Smart Sign)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Setup Android Project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # Ensure a basic build.gradle exists with SDK versions
          ROOT_GRADLE="android/build.gradle"
          if [ -f "$ROOT_GRADLE" ]; then
            sed -i 's/compileSdkVersion = [0-9]\+/compileSdkVersion = 34/g' $ROOT_GRADLE || true
            sed -i 's/targetSdkVersion = [0-9]\+/targetSdkVersion = 34/g' $ROOT_GRADLE || true
          fi
          npx cap sync android

      - name: Manage Signing Key
        run: |
          # Create keystore from secret or generate emergency one
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
            echo "ST_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "K_PASS=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "K_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          else
            keytool -genkeypair -v -keystore android/app/release.jks -alias sanctuary -keyalg RSA -keysize 2048 -validity 10000 -storepass sanctuary123 -keypass sanctuary123 -dname "CN=Mihrab, OU=Dev, O=Mihrab, L=City, S=State, C=US"
            echo "ST_PASS=sanctuary123" >> $GITHUB_ENV
            echo "K_PASS=sanctuary123" >> $GITHUB_ENV
            echo "K_ALIAS=sanctuary" >> $GITHUB_ENV
          fi

      - name: Inject Hardware-Level Gradle Config
        run: |
          # Use Python to surgically modify build.gradle without breaking it
          APP_GRADLE="android/app/build.gradle"
          python3 -c "
          import os, re
          
          st_pass = os.environ.get('ST_PASS', 'sanctuary123')
          k_pass = os.environ.get('K_PASS', 'sanctuary123')
          k_alias = os.environ.get('K_ALIAS', 'sanctuary')
          
          content = open('$APP_GRADLE').read()
          
          # 1. Ensure compileSdk is defined locally if missing from root
          if 'compileSdk ' not in content and 'compileSdkVersion' not in content:
              content = content.replace('android {', 'android {\n    compileSdk 34')
          
          # 2. Inject Signing Config with hardcoded values to avoid 'os' property issues
          signing_config = f'''
              signingConfigs {{
                  release {{
                      storeFile file(\"release.jks\")
                      storePassword \"{st_pass}\"
                      keyAlias \"{k_alias}\"
                      keyPassword \"{k_pass}\"
                  }}
              }}
          '''
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_config)
          
          # 3. Enable Signing in Release Build
          if 'signingConfig signingConfigs.release' not in content:
              content = content.replace('buildTypes {', 'buildTypes {\n        release {\n            signingConfig signingConfigs.release')
          
          # 4. Auto-Version based on build number
          run_num = os.environ.get('GITHUB_RUN_NUMBER', '1')
          content = re.sub(r'versionCode \d+', f'versionCode {run_num}', content)
          
          with open('$APP_GRADLE', 'w') as f:
              f.write(content)
          "
        env:
          ST_PASS: ${{ env.ST_PASS }}
          K_PASS: ${{ env.K_PASS }}
          K_ALIAS: ${{ env.K_ALIAS }}

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mihrab-V${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
